<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Comments API - Maintenance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg-primary: #15161a;
      --bg-secondary: #1e2128;
      --bg-tertiary: #2a2f39;
      --text-primary: #edf2ff;
      --text-secondary: #b8c0d9;
      --accent-blue: #4da3ff;
      --accent-green: #29c46d;
      --accent-red: #ff5c7a;
      --border-color: #3a4354;
      --shadow: 0 12px 40px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(77,163,255,0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(41,196,109,0.08), transparent 22%),
        linear-gradient(180deg, #121318 0%, #171922 100%);
      color: var(--text-primary);
      padding: 24px;
    }
  </style>
</head>
<body>
  <div id="maintenance-root"></div>
  <script src="/library/recursi.js" data-files="/Comments/maintenance-files.json"></script>
</body>
</html>
