<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  position: relative;
  font-family: system-ui, -apple-system, sans-serif;
  background: #111;
  color: #e0e0e0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.toolbar {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 10px;
  background: #1a1a2e;
  border-bottom: 1px solid #333;
  flex-shrink: 0;
}

.toolbar button {
  padding: 5px 12px; border-radius: 4px; cursor: pointer;
  font-size: 12px; font-weight: 600; border: 1px solid;
  transition: all 0.15s ease;
}

.toolbar button:hover { filter: brightness(1.2); }
.toolbar button:disabled { opacity: 0.4; cursor: default; }

#listenBtn {
  background: #1b3320; border-color: #2e4a32; color: #8abf8e;
}
#listenBtn.active {
  background: #331b1b; border-color: #4a2e2e; color: #bf8a8a;
}

#copyBtn {
  background: #1a2a4a; border-color: #2a4a6a; color: #8ab4d4;
}

#clearBtn {
  background: #3a1c1c; border-color: #5e2a2a; color: #bd8a8a;
  display: none;
}

#editBtn {
  background: #2a2a3e; border-color: #444; color: #aaa;
  font-size: 11px;
}

.status {
  flex: 1; font-style: italic; color: #666;
  font-size: 11px; margin: 0 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.editor {
  flex: 1; outline: none; white-space: pre-wrap;
  font-size: 14px; line-height: 1.5; color: #e0e0e0;
  padding: 10px; overflow-y: auto; background: #111;
  min-height: 0;
}

.popup-area {
  position: relative;
  flex-shrink: 0;
  min-height: 0;
}



.debug-log {
  height: 0px; /* set to 60px to show */ overflow-y: auto; padding: 4px 8px;
  font-family: monospace; font-size: 10px; line-height: 1.3;
  color: #555; background: #0a0a0a; border-top: 1px solid #222;
  flex-shrink: 0;
}

/* Quick Edit */
.qe-word, .qe-space { cursor: pointer; border-radius: 3px; }
.qe-space { display: inline-block; vertical-align: bottom; }
.qe-word.hl-main { background: rgba(0,122,204,0.85); }
.qe-word.hl-ctx { background: rgba(0,122,204,0.35); }
.qe-space.hl-space { animation: flash-g 0.8s infinite; }
@keyframes flash-g { 0%,100% { background: transparent; } 50% { background: #4dff4d; } }

.tentative-popup {
  position: fixed;
  top: 0;
  left: 0;
  background-color: #000;
  color: #fff;
  border: 2px solid #00e5ff;
  border-radius: 6px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.8);
  padding: 8px 12px;
  font-family: system-ui, sans-serif;
  font-size: 14px;
  z-index: 2147483647;
  pointer-events: none;
  display: none;
  will-change: transform;
  max-width: 400px;
  white-space: pre-wrap;
  word-break: break-word;
}
.tentative-popup-connector {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  pointer-events: none; overflow: visible; z-index: 2147483646;
}
.tentative-popup-connector path {
  fill: none;
  stroke: #00e5ff;
  stroke-width: 2px;
}
</style>
</head>
<body>

<div class="toolbar">
  <button id="listenBtn">Start</button>
  <button id="clearBtn">Clear</button>
  <span class="status" id="status">🔇 Ready</span>
  <button id="copyBtn">📋 Copy</button>
  <button id="editBtn">Quick Edit</button>
</div>

<div class="editor" id="editor" contenteditable="true"></div>


<div class="debug-log" id="debugLog"></div>



<script src="dictation.js"></script>
</body>
</html>
