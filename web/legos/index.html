<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lego Detective</title>
  <script src="/library/recursi.js"  data-files="/legos/files.json"></script>
</head>
<body>
  <template id="instructions-template">
    <div class="instructions-panel">
      <button class="instructions-close-btn">×</button>
      <h2>How to Play Lego Detective</h2>
      <ul>
        <li><strong>Control the View:</strong> Drag with your mouse or finger to rotate the models. Use the scroll wheel or pinch to zoom.</li>
        <li><strong>Find the Difference:</strong> Your goal is to find the one brick that has been moved, rotated, or is missing in one of the models. Tap on it to win!</li>
        <li><strong>Scoring:</strong> You get points for correct guesses but lose points for incorrect ones. Giving up also costs points.</li>
        <li><strong>Chain Reactions:</strong> Clicking the wrong brick can cause others to fall. If you destroy 3 or more bricks in a single chain reaction, you'll earn bonus points!</li>
        <li><strong>Collapse the UI:</strong> You can tap the detective mascot in the top-left corner at any time to collapse and expand this control panel.</li>
      </ul>
    </div>
  </template>
</body>
</html>
